name: Build and deploy Node.js app to Azure Web App - personal-outlook-mcp

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm install

      - name: Verify MCP server exists
        run: ls node_modules/.bin

      - name: Create deployment package
        run: zip -r release.zip . -x ".git/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip


  deploy:
    runs-on: ubuntu-latest

    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A9F0EB7758C24EBCB15B89479C3BC5D5 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A4368CF05CFD4A6E908B3C04EBFE36F0 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8B307E4956C8461782AA0D31BF6E1DC4 }}

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: personal-outlook-mcp
          slot-name: Production
          package: release.zip